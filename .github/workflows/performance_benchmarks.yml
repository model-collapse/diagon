name: Performance Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 2 AM UTC for trending analysis
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libicu-dev \
            libzstd-dev \
            liblz4-dev \
            zlib1g-dev \
            libbenchmark-dev

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-O3 -march=native" \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF \
            -DDIAGON_BUILD_BENCHMARKS=ON \
            -DDIAGON_BUILD_TESTS=OFF

      - name: Build benchmarks
        run: cmake --build build --target all -j$(nproc)

      - name: Run search benchmark
        run: |
          cd build/benchmarks
          ./SearchBenchmark --benchmark_format=json > search_results.json 2>&1 || true
          ./SearchBenchmark 2>&1 | tee $GITHUB_WORKSPACE/search_results.txt

      - name: Run indexing benchmark
        run: |
          cd build/benchmarks
          ./IndexingBenchmark --benchmark_format=json > indexing_results.json 2>&1 || true
          ./IndexingBenchmark 2>&1 | tee $GITHUB_WORKSPACE/indexing_results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: |
            search_results.txt
            indexing_results.txt

      - name: Summary
        run: |
          echo "## Search Benchmark" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat $GITHUB_WORKSPACE/search_results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Indexing Benchmark" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat $GITHUB_WORKSPACE/indexing_results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
